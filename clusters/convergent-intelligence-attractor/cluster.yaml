id: convergent-intelligence-attractor
name: Convergent Intelligence Attractor
status: draft
version: 0.1.0
created: '2026-07-04'
problem_class: >
  How the same high-level cognitive function (behavioural flexibility,
  problem-solving, "high intelligence") arises independently and repeatedly
  from non-homologous substrates that share no complex-brain common ancestor —
  and what architectural invariant the convergence reveals. The cluster
  addresses the design question inverse to isomorphism: not "one conserved
  machine redeployed under domain shift" but "many different machines, evolved
  separately, arriving at the same functional attractor." It asks what is
  actually necessary for intelligence by reading off what every independent
  route shares (a dense multimodal associative integration hub; network-quality
  metrics rather than absolute size) and what is contingent (the specific
  anatomy, the driving ecological pressure, the developmental tissue plan).

member_nexis:
  - convergent-integration-hub
  - convergence-fan-routes
  - network-density-over-size

system_falsifiable_hypothesis: >
  If high-level cognitive capability is a convergent functional attractor, then
  AI systems that target the substrate-invariant signature the convergence
  reveals (a dedicated dense associative integration hub, sized by
  connectivity/packing rather than raw parameter count) should reach comparable
  capability from architecturally diverse starting points at matched
  connectivity budget — and, conversely, scaling absolute size without a
  convergent integration hub should underperform. Refutation: if capability
  tracks absolute scale (parameter count / "brain size") rather than the
  presence and density of a convergent integration substrate — i.e. if the
  largest models reliably dominate regardless of integration architecture — the
  cluster's attractor claim collapses into a scale claim, and the
  convergence-fan shape carries no design content beyond "make it bigger."

natural_exemplars:
  - species: 'Multiple independent lineages (insects, cephalopods, teleost fish, birds, primates)'
    paper:
      title: 'Convergent evolution of complex brains and high intelligence'
      authors:
        - 'Roth, Gerhard'
      venue: 'Philosophical Transactions of the Royal Society B'
      date: '2015-12-19'
      doi: '10.1098/rstb.2015.0049'
      url: 'https://doi.org/10.1098/rstb.2015.0049'
    notes: >
      Comparative synthesis (Phil. Trans. R. Soc. B theme issue) documenting
      that complex brains and high intelligence evolved independently in taxa
      whose last common ancestor had neither — insect mushroom bodies,
      cephalopod vertical lobe, teleost everted pallium, avian nidopallium,
      primate isocortex. Intelligence is invariantly bound to a discrete
      multimodal associative centre; it tracks neuron number, packing density
      and connectivity rather than absolute brain size (elephants and cetaceans
      have larger brains but rank below corvids and primates). Anchors all three
      member NEXIs; the standout non-mammalian evidence (mushroom body, vertical
      lobe, everted pallium) is where the cluster's reframe value concentrates.

when_to_adopt: >
  Architecture-design and evaluation work where the question is "what is
  actually necessary for this capability" rather than "how do we scale what we
  have"; comparative / ablation studies that want a substrate-invariant target
  to design toward; settings where multiple heterogeneous sub-systems must reach
  a shared cognitive function and a common integration hub would serve all of
  them; research framing that needs a citable case against absolute-scale-equals-
  capability.

when_not_to_adopt: >
  Single-architecture optimisation where the substrate is fixed and the design
  question is tuning, not necessity; pretraining / substrate-construction work
  (the cluster reasons about the integration architecture atop a substrate, not
  about building the substrate); deployments where the empirical evidence
  genuinely favours raw scale for the target task and no integration bottleneck
  is observed.

tradeoffs: >
  The cluster trades the simplicity of a single-substrate design story for a
  substrate-general one: it forces the designer to separate what is necessary
  (a convergent integration hub, connectivity density) from what is incidental
  (a particular anatomy or scale), which is analytically demanding and resists
  off-the-shelf reuse. In return it yields a design target that is not hostage
  to any one substrate and an explicit, falsifiable alternative to scale-maximalism.

complementarity_notes: >
  The three member NEXIs compose under the convergence-fan shape — many
  independent routes fanning into one functional attractor — which is distinct
  from the four prior cluster shapes (constellation, pipeline, composition,
  isomorphism). It is the deliberate inverse of the embodied-action-selection
  cluster's isomorphism shape: isomorphism is one conserved machine under domain
  shift; convergence-fan is many non-homologous machines under one functional
  target.

  - convergence-fan-routes is the *shape layer*: it names the topology itself —
    the same function reached by non-homologous machinery across phyla — and
    supplies the independence evidence (ancestors lacked complex brains).
  - convergent-integration-hub is the *invariant layer*: what every route shares
    at the destination — a dedicated dense multimodal associative centre. The
    shape says the routes converge; this NEXI says what they converge on.
  - network-density-over-size is the *metric layer*: how to measure the invariant
    — connectivity and packing density, not absolute size — and the empirical
    anomaly (large-brained elephants/cetaceans rank below denser corvids/primates)
    that makes it falsifiable.

  Removing any one degrades the others: without the shape, the invariant is just
  a single-lineage observation; without the invariant, the shape is a bare
  "many roads" claim with no design target; without the metric, the invariant
  cannot be operationalised or falsified. Relation to the wider catalog: the hub
  invariant is complementary to (and must be disambiguated from) the
  distributed-social-cognition cluster's multi-modal-integration NEXI — that
  NEXI is about fusing sensory channels within one system; this cluster is about
  the convergent recurrence of an integration hub across independent systems.

