id: acerebrate-decision-making
name: Acerebrate Decision-Making
status: draft
version: 0.1.0
created: '2026-05-09'

problem_class: >
  How an agent without a centralised processing unit (no brain, no controller,
  potentially no nervous system) makes decisions about its environment, its
  internal state, and its commitment to behavioural modes — using only
  molecular regulatory networks or, by analogy, only substrate-flexible
  control primitives. The collection addresses substrate-independent
  decision-making architecture: patterns that produce flexible, adaptive,
  context-conditional behaviour without relying on a centralised
  controller-substrate.

member_nexis:
  - coincidence-detection-gating
  - stochastic-memory-coupling
  - meta-regulation

system_falsifiable_hypothesis: >
  AI architectures that adopt the full acerebrate-decision-making collection
  (multi-stream coincidence-detection gating + stochastic-memory paired
  exploration + explicit meta-regulation) outperform same-budget single-axis
  architectures on decision-making tasks under unpredictability and partial
  observability, by margins larger than the sum of individual-pattern gains.
  Refutation: if pipeline-designed systems perform no better than the best
  individual-NEXI baseline at matched compute on appropriately heterogeneous
  benchmarks (varying environmental predictability, multi-stream context
  availability, and non-stationarity), the collection's compositional claim is
  refuted (the patterns may still be individually useful as standalone NEXIs).

natural_exemplars:
  - species: 'Bacteria (multiple species: Escherichia coli, Vibrio cholerae, Bacillus subtilis, Bacillus halodurans)'
    paper:
      title: 'The need for a new perspective on decision-making in bacteria'
      authors:
        - 'Nesin, Sibin Mathew'
        - 'Chandrankunnel, Mathew'
      venue: 'Communicative & Integrative Biology'
      date: '2025-02-12'
      doi: '10.1080/19420889.2025.2463926'
      url: 'https://doi.org/10.1080/19420889.2025.2463926'
    notes: >
      Peer-reviewed review article (CC BY 4.0) synthesising evidence that
      bacterial decision-making is the product of complex, modular, convergent-
      divergent molecular pathways implementing the full collection:
      coincidence detection (Vibrio cholerae biofilm requires both LuxPQ-AI-2
      and CqsS-CAI-1 to be activated); stochastic-memory coupling (random
      gene-expression switching paired with iron-based cellular memory);
      meta-regulation (anti-σ proteins as a first-class regulator-of-regulators
      layer above σ factors). All three primitives operate in organisms with
      no nervous system at all.

  - species: 'Acerebrate metazoans (jellyfish, sea anemones)'
    paper:
      title: 'Cognitive capacity and control in the evolution of intelligence'
      authors:
        - 'Turner, Cameron Rouse'
        - 'Russek, Evan M.'
        - 'Seed, Amanda'
        - 'McEwen, Emma Suvi'
        - 'Vélez, Natalia'
        - 'Morgan, Thomas J. H.'
        - 'Griffiths, Thomas L.'
      venue: 'bioRxiv preprint'
      date: '2026-03-09'
      doi: '10.1101/2026.03.07.710317'
    notes: >
      Phylogenetic placement (P21) of jellyfish and sea anemones in the
      passive-storage regime — nerve net, no brain. They display short-term
      storage via sensitisation but lack control functions (no selective
      attention, no shielding from interference). Provides a corroborating
      second source for the substrate-independence claim that motivates this
      collection, even though the paper's primary subject is across-species
      cognitive evolution rather than bacteria specifically.

when_to_adopt: >
  Decision-making AI deployments where the system must commit to behavioural
  modes under partial observability, environmental unpredictability, or
  non-stationarity, and where centralised-controller assumptions are weak
  (multi-agent populations, decentralised systems, embedded/edge deployments
  without central server, distributed databases that need self-coordination).
  Especially where multi-stream context information is available and the cost
  of premature commitment is high.

when_not_to_adopt: >
  Single-stream classification or regression tasks with stable input
  distributions; deployments with reliable centralised controllers and
  strong observability; tasks where computational cost asymmetry favours
  amplitude-coded representation over the collection's combination of
  coincidence-gating + stochastic-memory + meta-regulation overhead;
  research / exploratory architectures deliberately operating without
  decision-commitment requirements.

tradeoffs: >
  The collection trades architectural-overhead cost (additional regulator
  components, persistent memory stores, multi-stream input wiring) against
  decision-quality under unpredictability. For deployments with stable inputs
  and strong centralised observability, the overhead is wasted. For
  deployments where unpredictability is the dominant cost driver, the collection
  pays. Engineers should explicitly assess deployment-niche unpredictability
  before adopting.

complementarity_notes: >
  The three patterns compose by layering, not by sequencing (distinct in
  shape from the bounded-cognitive-architecture pipeline collection):

  - coincidence-detection-gating provides the *commitment-gate* layer:
    decisions to enter a major behavioural mode require multiple independent
    context streams to align. This prevents premature commitment and reduces
    decision regret under noisy single-stream input.

  - stochastic-memory-coupling provides the *exploration-with-retention*
    layer: random state-switching populates the option space; persistent
    cellular memory tracks which states proved beneficial. Together they
    yield decision-making under unpredictability without requiring runtime
    learning in the conventional sense.

  - meta-regulation provides the *control-over-control* layer: explicit
    regulators-of-regulators dynamically up- or down-regulate the regulators
    themselves at runtime. This is the layer that allows the system to adapt
    its own control behaviour to changing environments without architecture
    redeployment.

  Removing any one component degrades the others:

  - Without coincidence-gating, stochastic exploration commits prematurely on
    single-channel evidence.
  - Without stochastic-memory coupling, coincidence-gated decisions still
    operate on a fixed exploration policy.
  - Without meta-regulation, the collection's parameters are fixed at deployment
    rather than dynamically adapted.

  This is the collection's compositional claim. The collection shape is therefore
  *composition* (layered concurrent runtime mechanisms within a single agent),
  distinct from both distributed-social-cognition (constellation of mutually-
  enabling patterns across agents) and bounded-cognitive-architecture
  (sequenced design-time pipeline).

