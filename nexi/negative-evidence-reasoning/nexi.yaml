formats:
  - architecture
  - skill

when_to_use: >
  Tasks where the diagnostic information is in what is missing rather
  than what is present: anomaly and fault detection, diagnostic
  reasoning where absent findings rule things in or out, security
  monitoring where the missing heartbeat is the alarm, and any language
  task that turns on negation (what is not true, not permitted, not
  present). Also whenever a system must not silently treat "not
  observed" as "not relevant".

when_not_to_use: >
  Tasks where the expected-signal set cannot be characterised (no model
  of what should be present, so absence carries no information);
  settings where observation is so incomplete that missing and
  unobserved cannot be distinguished; strict latency budgets that
  preclude maintaining and diffing an expectation model.

tradeoffs: >
  Reasoning about what is not there requires enumerating or sampling
  expected signals, which is more expensive than scoring present tokens.
  The expectation model must be trained and calibrated on held-out data,
  or it fabricates absences. There is an irreducible tension: a
  more-sensitive expectation model finds more diagnostic gaps but also
  hallucinates more; the abstention threshold trades these off and must
  be tuned per deployment.

