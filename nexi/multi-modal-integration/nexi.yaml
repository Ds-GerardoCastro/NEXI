natural_exemplars:
  - species: 'Cross-phyletic synthesis (Hymenoptera, Cephalopoda, Teleostei, Aves, Mammalia)'
    paper:
      title: 'Convergent evolution of complex brains and high intelligence'
      authors:
        - 'Roth, Gerhard'
      venue: 'Philosophical Transactions of the Royal Society B'
      date: '2015-12-19'
      doi: '10.1098/rstb.2015.0049'
      url: 'https://doi.org/10.1098/rstb.2015.0049'
    notes: >
      Reviews the convergent emergence of dedicated multimodal integration
      centres across five independent lineages — insect mushroom bodies,
      octopod vertical lobe, cichlid pallium, corvid/psittacid avian
      pallium, and mammalian isocortex. None are anatomical homologues, yet
      all share the architectural commitment of integrating multiple sensory
      streams on a shared associative substrate — in Roth's own framing,
      "multimodal centres … highly ordered associative networks". Quantitative
      circuit figures, as reviewed by Roth (2015), read at the substrate level
      as expansion-and-convergence: the honeybee mushroom body has ~300,000
      Kenyon cells receiving from ~800 projection neurons (an expansion, few PN
      → many KC; note the ~300,000 figure is given by Roth as a personal
      communication from Menzel, not a published primary count), and the
      octopus vertical lobe has ~26 million interneurons converging on ~65,000
      projection neurons (a convergence, which Roth reviews from primary
      sources — Young; Shomrat & Hochner). A single natural source,
      cross-phyletic and anatomical; with no second independent natural leg,
      this NEXI is a single-source draft.

abstract_claim: >
  A single underlying state is observable through multiple sensory
  channels. Joint latent representations that explain multiple streams
  simultaneously preserve cross-channel coherence (and benefit from it);
  the decisive axis is whether a training-time cross-modal alignment
  objective is present, not whether fusion happens early or late —
  jointly-trained late fusion aligns too. The open convergence question
  this NEXI hypothesises: whether single-modality systems are structurally
  incomplete, seeing only what their channel reveals. That is a conjecture,
  not an established fact.

falsifiable_hypothesis: >
  Architectures trained with a cross-modal alignment objective (a shared
  latent space aligned across modalities at training time) achieve better
  cross-modal grounding than architectures without one (per-modality
  encoders fused at output with no alignment term), on tasks requiring
  cross-modal inference, at equal and compute-matched training budget.
  Operationalised on a named, pre-registered cross-modal retrieval
  benchmark and split (e.g. Flickr30K 1K test image↔text retrieval),
  the aligned architecture should outperform the unaligned baseline by
  >=10% relative on the cross-modal retrieval metric (Recall@1).
  Caveat: a calibrated cross-modal-alignment metric is itself contested,
  so the benchmark and split must be fixed in advance. Refutation: if the
  unaligned baseline matches the aligned architecture on the pre-registered
  benchmark at compute-matched budget, this pattern's claim is refuted.

