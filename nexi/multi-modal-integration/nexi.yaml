      networks: vocal signals and movement carry convergent information
      about the same underlying social state. Male song acts as a proxy
      for pair co-presence; the two channels are mutually confirming.

abstract_claim: >
  A single underlying state is observable through multiple sensory
  channels. Joint latent representations that explain multiple streams
  simultaneously preserve cross-channel coherence (and benefit from it),
  while late-fusion architectures throw away the structural alignment
  between modalities. Single-modality systems are structurally
  incomplete — they can only see what their channel reveals.

falsifiable_hypothesis: >
  Architectures with joint multi-modal encoders (single shared latent
  space across modalities) achieve better cross-modal grounding than
  late-fusion architectures (separate per-modality encoders, fused at
  output) on tasks requiring cross-modal inference, at equal training
  compute. Operationalised on benchmarks of cross-modal retrieval,
  audio-visual grounding, and embodied navigation, joint architectures
  should outperform late-fusion ones by >=10% relative on cross-modal
  metrics. Refutation: if late-fusion matches joint encoding on
  cross-modal benchmarks at equal compute, this pattern's claim is
  refuted.

