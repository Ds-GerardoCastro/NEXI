when_to_use: >
  Settings with multiple sensory channels carrying complementary or
  confirming information: vision + audio in robotics, vision + language
  in grounded models, acoustic + spatial in animal-monitoring systems,
  text + structured data in agent-based systems. Tasks that require
  cross-channel inference or that benefit from redundancy.

when_not_to_use: >
  Single-modality settings; tasks where one modality strictly dominates
  (additional channels add noise without signal); strict latency budgets
  that preclude joint encoders.

tradeoffs: >
  Joint encoders are larger and harder to train than late-fusion
  baselines. They require aligned multi-modal training data, which can
  be costly to curate. They are also harder to debug — failure modes
  cross channels rather than localising to one.

