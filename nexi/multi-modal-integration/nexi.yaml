natural_exemplars:
  - species: 'Taeniopygia castanotis (zebra finch)'
    paper:
      title: 'Communication Networks of Wild Zebra Finches (Taeniopygia castanotis)'
      authors:
        - 'Hagedoorn, K.'
        - 'Tschirren, N.'
        - 'ter Avest, E.'
        - 'Tyson, C.'
        - 'Snijders, L.'
        - 'Griffith, S. C.'
        - 'Naguib, M.'
        - 'Loning, H.'
      venue: 'bioRxiv preprint'
      date: '2026-04-27'
      doi: '10.1101/2025.09.11.675577'
    notes: >
      Zebra finch song-based social networks mirror spatial co-occurrence
      networks: vocal signals and movement carry convergent information
      about the same underlying social state. Male song acts as a proxy
      for pair co-presence; the two channels are mutually confirming.
  - species: 'Cross-phyletic synthesis (Hymenoptera, Cephalopoda, Teleostei, Aves, Mammalia)'
    paper:
      title: 'Convergent evolution of complex brains and high intelligence'
      authors:
        - 'Roth, Gerhard'
      venue: 'Philosophical Transactions of the Royal Society B'
      date: '2015-12-19'
      doi: '10.1098/rstb.2015.0049'
      url: 'https://doi.org/10.1098/rstb.2015.0049'
    notes: >
      Reviews the convergent emergence of dedicated multimodal integration
      centres across five independent lineages — insect mushroom bodies,
      octopod vertical lobe, cichlid pallium, corvid/psittacid avian
      pallium, and mammalian isocortex. None are anatomical homologues, yet
      all share the architectural commitment of integrating multiple sensory
      streams on a shared associative substrate. Quantitative circuit data
      (honeybee mushroom body: ~300,000 Kenyon cells reading 800 projection
      neurons; octopus vertical lobe: ~26M interneurons converging on 65,000
      projection neurons) supports the joint-encoder reading at the substrate
      level. Second independent source, cross-phyletic and anatomical, on top
      of the zebra-finch behavioural evidence — the basis for canonical
      promotion (2026-07-04).

abstract_claim: >
  A single underlying state is observable through multiple sensory
  channels. Joint latent representations that explain multiple streams
  simultaneously preserve cross-channel coherence (and benefit from it),
  while late-fusion architectures throw away the structural alignment
  between modalities. Single-modality systems are structurally
  incomplete — they can only see what their channel reveals.

falsifiable_hypothesis: >
  Architectures with joint multi-modal encoders (single shared latent
  space across modalities) achieve better cross-modal grounding than
  late-fusion architectures (separate per-modality encoders, fused at
  output) on tasks requiring cross-modal inference, at equal training
  compute. Operationalised on benchmarks of cross-modal retrieval,
  audio-visual grounding, and embodied navigation, joint architectures
  should outperform late-fusion ones by >=10% relative on cross-modal
  metrics. Refutation: if late-fusion matches joint encoding on
  cross-modal benchmarks at equal compute, this pattern's claim is
  refuted.

