id: context-bound-semantics
name: Context-Bound Semantics
status: draft
version: 0.1.1
created: '2026-05-03'
audience_voice: builder

natural_exemplars:
  - species: 'Taeniopygia castanotis (zebra finch)'
    paper:
      title: 'Communication Networks of Wild Zebra Finches (Taeniopygia castanotis)'
      authors:
        - 'Hagedoorn, K.'
        - 'Tschirren, N.'
        - 'ter Avest, E.'
        - 'Tyson, C.'
        - 'Snijders, L.'
        - 'Griffith, S. C.'
        - 'Naguib, M.'
        - 'Loning, H.'
      venue: 'bioRxiv preprint'
      date: '2025-09-11'
      doi: '10.1101/2025.09.11.675577'
      status: 'unrefereed bioRxiv preprint; observational'
    notes: >
      The same zebra finch song appears to carry different candidate
      functions across social contexts. In the breeding colony the authors
      suggest song may primarily reinforce pair bonds and act as
      reproductive cues; at the social hotspot they suggest it might have a
      wider social trigger, potentially coordinating breeding. The signal
      is the same; its interpreted function shifts with context. Serves as
      a natural analog for context-conditional interpretation, not as
      empirical support for the ML hypothesis.

abstract_claim: >
  Meaning is a function of signal × context, not of signal alone.
  Architectures that bind interpretation to context — the state of the
  world, the participants involved, and the role the signal plays in
  that setting — can capture semantics that token-statistical models can
  miss.

falsifiable_hypothesis: >
  Architectures with explicit context-conditional decoders outperform
  context-independent baselines on tasks where semantic interpretation
  shifts across contexts, at equal training compute. Operationalised on a
  named, pre-registered, compute-matched pragmatic-implicature / context-
  shift NLU benchmark and split, context-conditional decoders should
  achieve >=10% relative gain on the benchmark's context-shift metric.
  Refutation: if a context-independent baseline of matched compute equals
  the context-conditional model on that pre-registered context-shift split,
  this pattern's claim is refuted.

