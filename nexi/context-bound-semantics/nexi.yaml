formats:
  - architecture
  - skill

when_to_use: >
  Tasks where the same signal can mean different things in different
  contexts (multi-domain agents, pragmatic dialogue, role-aware tools);
  domains with non-stationary semantics where interpretation must be
  conditioned on the current setting rather than read off the signal
  alone.

when_not_to_use: >
  Tasks where signals have stable, context-independent meaning (most
  classification, most code interpretation); strict latency budgets
  that preclude conditional reasoning; settings where context cannot
  be reliably observed.

tradeoffs: >
  Context-conditional decoders span a larger function class than
  context-independent ones (they realise a family of input-output
  mappings indexed by context); a FiLM-style modulation adds only a few
  parameters, so the cost is expressiveness discipline, not raw parameter
  count. Training data must include the same signal in multiple contexts,
  which is harder to curate than i.i.d. samples. Semantic/context routing
  for mixture-of-experts is not a solved problem, so FiLM-style modulation
  or cross-attention is the more reliable default; MoE routing remains
  aspirational.

