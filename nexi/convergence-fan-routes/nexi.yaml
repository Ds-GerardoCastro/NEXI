id: convergence-fan-routes
name: Substrate-Diverse Routes to One Function
status: draft
version: 0.1.0
created: '2026-07-04'
audience_voice: builder

natural_exemplars:
  - species: 'Ecdysozoa, Lophotrochozoa, and Vertebrata (insects, cephalopods, teleosts, birds, mammals)'
    paper:
      title: 'Convergent evolution of complex brains and high intelligence'
      authors:
        - 'Roth, Gerhard'
      venue: 'Philosophical Transactions of the Royal Society B'
      date: '2015-12-19'
      doi: '10.1098/rstb.2015.0049'
      url: 'https://doi.org/10.1098/rstb.2015.0049'
    notes: >
      "The highly complex brains found in insects and in cephalopods must have
      evolved independently, and with them high intelligence." Each of the major
      taxa surveyed had ancestors that revealed neither complex brains nor
      intelligent behaviour, forcing an independent-convergence reading: the same
      functional attractor reached by anatomically and developmentally divergent
      machinery (everted vs evaginated pallium; nuclear vs laminar telencephalon).

abstract_claim: >
  High-level cognitive function is a convergent attractor reachable by multiple
  independent, non-homologous architectures. The same outcome — behavioural
  flexibility, problem-solving — is arrived at from starting points that share
  no common complex-brain ancestor and no common tissue plan. Function, not
  substrate provenance, defines the destination; the diversity of viable routes
  is itself the evidence that the capability is substrate-general rather than
  tied to one privileged architecture.

falsifiable_hypothesis: >
  If a target cognitive function is a genuine convergent attractor, then multiple
  architecturally distinct systems, optimised independently toward that function,
  should reach comparable capability without sharing a common structural
  blueprint — and no single structural homology should be necessary across all
  successful systems. Refutation: if every high-capability system is found to
  require one specific shared structural feature (a particular layer plan, cell
  type, or connectivity motif present in all and absent in all failures), the
  convergence claim collapses into a single-architecture necessity claim, and
  "many routes" is an illusion of superficial variation over one required core.

applies_to:
  - architecture-selection
  - world-models
  - neural-architecture-search
  - agi-critique

formats:
  - architecture

when_to_use: >
  When arguing or testing whether a capability is tied to a specific architecture
  or is substrate-general; when justifying architectural diversity or an ablation
  programme that seeks the necessary invariant by varying the substrate; as a
  framing against "only this architecture can achieve X" claims.

when_not_to_use: >
  When the engineering goal is to optimise one fixed substrate rather than to ask
  what is necessary across substrates; when only a single architecture is
  available or affordable, making the multiplicity-of-routes framing moot.

tradeoffs: >
  Treating a function as a convergent attractor licenses architectural
  exploration but offers no shortcut to which route is cheapest or best for a
  given budget — convergence says many routes exist, not that they are equally
  economical. The pattern buys substrate-independence of the design target at the
  cost of leaving route selection underdetermined.

