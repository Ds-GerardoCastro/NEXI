natural_exemplars:
  - species: 'Taeniopygia castanotis (zebra finch)'
    paper:
      title: 'Communication Networks of Wild Zebra Finches (Taeniopygia castanotis)'
      authors:
        - 'Hagedoorn, K.'
        - 'Tschirren, N.'
        - 'ter Avest, E.'
        - 'Tyson, C.'
        - 'Snijders, L.'
        - 'Griffith, S. C.'
        - 'Naguib, M.'
        - 'Loning, H.'
      venue: 'bioRxiv preprint (non-peer-reviewed)'
      date: '2025-09-11'
      doi: '10.1101/2025.09.11.675577'
    notes: >
      Correlational field study of wild zebra finches in arid-zone social
      hotspots, measuring co-singing proximity to reconstruct low-strength
      communication networks (the authors note overall low network strength,
      "birds mostly move around"). Consistent with population-level information
      flow among individuals; the study does not itself test eavesdropping or
      third-party inference. Observed proximity structure may facilitate
      breeding synchronisation and coincides with social hotspots (shown to
      exist, not shown to be formed by eavesdropping). The paper ties dawn-song
      / mate-choice functions to territorial songbirds and explicitly contrasts
      zebra finches, so mate choice is not a documented finch finding here.

  - species: 'Multiple songbird species'
    paper:
      title: 'Communication networks'
      authors: ['McGregor, P. K.', 'Dabelsteen, T.']
      venue: 'in: Ecology and Evolution of Acoustic Communication in Birds (Cornell University Press)'
      date: '1996'
    notes: >
      Foundational reference establishing 'communication networks' — networks of
      potential information flow among individuals — in animal-communication ecology.

abstract_claim: >
  Three layers, kept distinct. (a) Natural evidence: Hagedoorn et al. (2025)
  reconstruct low-strength communication networks in wild zebra finches from
  co-singing proximity — consistent with population-level information flow about
  breeding-state, resources, and predation among individuals who observe but do
  not directly participate in nearby interactions (hedged; the study is
  correlational and does not itself test eavesdropping or inference). (b) The
  broader communication-networks tradition (McGregor & Dabelsteen 1996) frames
  signalling interactions as observable to non-target receivers, a general
  substrate for information flow beyond addressed messages. (c) AI design claim
  (this NEXI's hypothesis, not shown by the biology): granting agents structured
  access to third-party communications they observe — rather than restricting
  input to self-addressed messages — may let multi-agent systems build richer
  models of social state (at most weak, hedged inferences about others'
  relationships or associations) with less direct interaction cost.

falsifiable_hypothesis: >
  Multi-agent reinforcement-learning systems with attention over observed third-party
  interactions achieve higher sample efficiency on partially-observable cooperative
  tasks than identical systems restricted to self-directed observation. Specifically:
  at equal training compute on a benchmark of N>=3-agent partially-observable cooperative
  tasks (e.g. Overcooked-AI multi-agent variants, Hanabi, or comparable social-inference
  benchmarks), eavesdropping-enabled agents reach a target performance threshold in
  fewer training episodes by a measurable margin (>=10% reduction in episode count to
  threshold). Refutation: if no such margin appears across an appropriate benchmark
  suite, this NEXI is refuted as an architectural primitive.

