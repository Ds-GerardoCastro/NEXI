    paper:
      title: 'Communication Networks of Wild Zebra Finches (Taeniopygia castanotis)'
      venue: 'bioRxiv preprint'
      date: '2026-04-27'
    notes: >
      Wild zebra finches in arid-zone social hotspots extract information from
      observed third-party song interactions, informing mate choice, breeding
      synchronisation, and social hotspot formation.

  - species: 'Multiple songbird species'
    paper:
      title: 'Communication networks'
      authors: ['McGregor, P. K.', 'Dabelsteen, T.']
      venue: 'in: Ecology and Evolution of Acoustic Communication in Birds (Cornell University Press)'
      date: '1996'
    notes: >
      Foundational reference establishing 'communication networks' — networks of
      potential information flow among individuals — in animal-communication ecology.

abstract_claim: >
  Agents that observe but do not directly participate in interactions can still
  extract information about the participants — their goals, knowledge, capabilities,
  relationships. By granting agents structured access to third-party communications
  they observe (rather than restricting input to self-addressed messages), multi-agent
  systems can build richer models of social state with less direct interaction cost.

falsifiable_hypothesis: >
  Multi-agent reinforcement-learning systems with attention over observed third-party
  interactions achieve higher sample efficiency on partially-observable cooperative
  tasks than identical systems restricted to self-directed observation. Specifically:
  at equal training compute on a benchmark of N>=3-agent partially-observable cooperative
  tasks (e.g. Overcooked-AI multi-agent variants, Hanabi, or comparable social-inference
  benchmarks), eavesdropping-enabled agents reach a target performance threshold in
  fewer training episodes by a measurable margin (>=10% reduction in episode count to
  threshold). Refutation: if no such margin appears across an appropriate benchmark
  suite, this NEXI is refuted as an architectural primitive.

