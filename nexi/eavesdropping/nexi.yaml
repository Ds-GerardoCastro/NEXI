when_to_use: >
  Multi-agent settings with shared, partially observable environment, where tasks
  benefit from inferring others' goals, knowledge, or relationships, and where direct
  interaction is costly, infrequent, or noisy. Population size moderate (small enough
  that observation is tractable, large enough that eavesdropping adds signal beyond
  direct interaction).

when_not_to_use: >
  Single-agent settings (nothing to eavesdrop on); privacy-preserving or adversarial
  contexts where observed agents may signal deceptively or eavesdroppers may exfiltrate
  sensitive context; strict compute constraints (eavesdropping multiplies the input
  stream by approximately the number of observable agents); tasks where direct
  experience suffices and inferring others adds no signal.

tradeoffs: >
  Information richness vs. compute cost (attention scales with observable population);
  privacy and robustness (third-party observability creates attack surface); memory
  pressure (observed-interaction history grows unbounded without summarisation).

