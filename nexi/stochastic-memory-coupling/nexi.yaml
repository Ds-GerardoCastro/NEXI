when_to_use: >
  Decision-making under environmental unpredictability where the system has
  to balance exploration with exploitation, and where retaining state across
  decisions is feasible. Especially appropriate for non-stationary
  environments, multi-step agentic tasks, and deployments where the task
  distribution is heterogeneous enough that no single fixed policy will
  perform well.

when_not_to_use: >
  Stable / stationary single-task deployments where the optimal policy is
  knowable in advance — the stochastic-exploration overhead provides no
  payoff. Cases where persistent memory is structurally unavailable
  (memoryless protocols, strict stateless service interfaces). Tasks where
  the cost of stochastic exploration is unbounded (irreversible production
  side effects without rollback) — the pattern presupposes that stochastic
  switching is bounded in cost.

tradeoffs: >
  The coupling costs both stochastic-exploration overhead (sampling cost,
  potentially worse short-term outcomes) and memory-storage overhead
  (persistent state, retrieval costs at decision time). It pays when
  unpredictability is high enough that fixed-policy or fixed-memory baselines
  fail. The coupling specifically must avoid two failure modes:
  (a) memory-domination (all transitions become deterministic, eliminating
  exploration), and (b) stochasticity-domination (memory has insufficient
  weight, decisions stay random). The architecture must keep both
  components active and balance their relative contribution.

