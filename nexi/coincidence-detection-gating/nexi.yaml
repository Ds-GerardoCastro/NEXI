id: coincidence-detection-gating
name: Coincidence-Detection Gating
status: draft
version: 0.1.1
created: '2026-05-09'
audience_voice: builder

natural_exemplars:
  - species: 'Vibrio cholerae'
    paper:
      title: 'The need for a new perspective on decision-making in bacteria'
      authors:
        - 'Nesin, Sibin Mathew'
        - 'Chandrankunnel, Mathew'
      venue: 'Communicative & Integrative Biology'
      date: '2025-02-12'
      doi: '10.1080/19420889.2025.2463926'
      url: 'https://doi.org/10.1080/19420889.2025.2463926'
    notes: >
      Vibrio cholerae biofilm formation requires coincidence detection across
      two independent receptor systems: BOTH LuxPQ (responding to AI-2) AND
      CqsS (responding to CAI-1) must be activated for the bacterium to
      commit to colony behaviour. If either receptor is in the inactivated
      state, individualistic behaviour persists. The paper itself uses the
      explicit phrase "coincidence detection" for this gating mechanism.

abstract_claim: >
  Commitment to a major behavioural mode (regime switch, capacity expansion,
  modal transition) should require multiple independent context streams to
  align. A single signal is insufficient; coincidence detection across
  qualitatively different context channels is the gating primitive that
  prevents premature commitment under noisy or partial single-stream input.
  The pattern operates at the architectural level — explicit AND-gates over
  qualitatively different evidence streams — not at the parameter or training-
  loss level. "Qualitatively different" streams are operationally those with
  independent failure modes (low cross-stream error correlation), so
  single-channel error or single-channel adversarial perturbation cannot alone
  open the gate. The gate requires at least two such streams and never degrades
  below that two-stream floor.

falsifiable_hypothesis: >
  Primary (lesion) test: in a coincidence-gated architecture, removing any one
  required evidence stream measurably degrades decision quality on high-regret,
  irreversible-action tasks; if removing a stream leaves performance unchanged,
  that stream was not load-bearing and the gate was effectively single-channel.
  Comparative test: at matched compute AND matched task-completion level — to
  control for the base-rate shift, since an AND-gate trivially lowers the raw
  commitment rate — multi-stream coincidence-gated systems commit fewer unsafe /
  policy-violating irreversible actions than single-channel-gated baselines on
  agentic-safety task families (e.g. irreversible tool calls, write actions to
  external systems, agentic loops without rollback). Refutation: if the lesion
  test shows no per-stream degradation, or if coincidence-gating yields no
  reduction in unsafe irreversible commitments at matched completion, this NEXI
  is refuted as an architectural primitive.

applies_to:
  - decision-gating
  - multi-agent-systems
  - tool-using-agents
  - irreversible-action-deployments
  - non-stationary-environments
  - regime-switching

formats:
  - architecture
  - skill

when_to_use: >
  Any deployment where the system commits to a behavioural mode whose reversal
  is costly (irreversible tool calls, agentic loops without rollback, mode
  changes that incur setup overhead). Especially when single-stream evidence
  is noisy or under-determined and multiple independent context channels
  exist. Multi-agent settings where commitment to a coordinated behaviour
  needs multi-channel evidence alignment.

when_not_to_use: >
  Deployments where commitments are cheap to reverse (simple chat turns with
  no external side effects, classification tasks, retrieval-only systems).
  Settings where only one context stream is meaningfully available — adding
  artificial coincidence-gates across one stream provides no signal.
  Compute-budget-constrained deployments where multi-stream wiring is too
  expensive relative to its decision-quality return.

tradeoffs: >
  Coincidence-gating costs architectural complexity (multi-stream input
  wiring, explicit AND-gate logic, evidence accumulation state) against
  decision-quality. The pattern pays when premature commitment is the
  dominant failure mode; it adds overhead without payoff when single-channel
  decisions are already reliable. Phase-boundary handling: if one of the
  required streams becomes consistently unavailable, the gating logic must
  degrade gracefully rather than block forever.

