when_to_use: >
  Embodied-AI deployments where agent-internal state and agent-external state
  share goal-relevant structure and would benefit from unified treatment;
  systems where goal-context-action provenance is a deliverable (debugging,
  audit, lesion experiments); long-horizon agents where transfer of learned
  behavioural associations across contexts is a primary efficiency lever;
  research / engineering work where a citable formal framework with verbatim
  equations is preferable to ad-hoc descriptions of agent-environment
  interaction.

when_not_to_use: >
  Single-shot perception or classification systems where goal-context-action
  structure is absent. Pure-substrate construction (foundation-model
  pretraining) where the formalism's relational structure does not yet
  apply. Deployments where the cost of formalism-discipline (committing to
  the typed C / B / g / E / P / Br / Ba structure) outweighs the payoff in
  decision provenance and transfer attribution. Research / exploratory
  contexts deliberately operating without a goal-directed framing.

tradeoffs: >
  The formalism trades upfront design discipline (committing to typed
  agent-goal-environment-behaviour relational structure, exposing
  behavioural associations Ba(g, P) as a first-class data structure,
  formalising the unified state schema E) against descriptive flexibility.
  For deployments where the relational structure is genuinely present
  (embodied agents, long-horizon planners, cross-domain reasoners), the
  formalism pays in decision provenance, transfer attribution, and lesion-
  experiment ability. For deployments where the formalism is forced onto
  ill-fitting tasks (pure perception, single-shot classification), the
  discipline cost is wasted.

