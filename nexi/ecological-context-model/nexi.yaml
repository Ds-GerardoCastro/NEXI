id: ecological-context-model
name: Ecological Context Model
status: draft
version: 0.1.0
created: '2026-05-10'
audience_voice: builder

natural_exemplars:
  - species: 'Vertebrates (formal model anchored in CBGTC neuroanatomy from lamprey to human)'
    paper:
      title: >
        Embodied and embedded ecological rationality: A common vertebrate
        mechanism for action selection underlies cognition and heuristic
        decision-making in humans
      authors:
        - 'Nordli, Samuel A.'
        - 'Todd, Peter M.'
      venue: 'Frontiers in Psychology'
      date: '2022-11-17'
      doi: '10.3389/fpsyg.2022.841972'
      url: 'https://doi.org/10.3389/fpsyg.2022.841972'
    notes: >
      Source paper introduces the Ecological Context Model — a symbolic
      framework with three numbered equations describing context construction
      (eq. 1: C = {A(g), E}), behaviour selection (eq. 2: B(C) = f(Br, Ba(g, P))),
      and goal achievement (eq. 3: g+(C) = f(B, E)). The model generalises
      Lewin's (1936) field-theory equation B = f(A, E) to specify what context,
      behaviour, and goal-achievement mean as relational structures with
      explicit terms for environment, agent-perceptible features, behavioural
      repertoire, perceptions, and goal-context-behaviour associations. The
      formalism unifies motor and cognitive control under one framework and
      anchors the rest of the embodied-action-selection cluster.

abstract_claim: >
  Architectures for embodied agents should commit to a single unified state
  schema in which context (C) is the unit of analysis, defined as an agent
  oriented toward a specific goal (g) within a particular environment (E),
  with goal-achievement (g+) determined by the executed behaviour (B) and
  the full environmental structure E — not just the perceptible subset E(A)
  the agent can act on. The Ecological Context Model formalises this with
  three numbered equations (C = {A(g), E}; B(C) = f(Br, Ba(g, P));
  g+(C) = f(B, E)) that provide a citable framework for action selection,
  habit formation, transfer of learning, and heuristic decision-making.
  Internal agent state — cognitive architecture, behavioural repertoire,
  circadian rhythm, memories, emotions, interoceptions — is part of E,
  not a separate inner stage; embodiment is a state-merger commitment.

falsifiable_hypothesis: >
  At matched compute and identical task budgets, AI architectures committing
  to the Ecological Context Model formalism (single unified E containing
  agent-internal and agent-external features; explicit Br repertoire;
  behavioural associations indexed as Ba(g, P); selection via equation (2);
  goal-achievement evaluated via equation (3)) outperform agent-environment-
  separated architectures on tasks requiring (a) goal-context-action
  provenance, (b) cross-domain transfer of learned behavioural associations
  via overlap in P, and (c) goal-achievement attribution distinguishing
  perception-failure from environment-failure. Specifically, when an action
  fails to achieve its goal, ECM-formalism architectures should be measurably
  better at distinguishing "the agent's perceptions P were inadequate" from
  "the environment E differed from training in goal-relevant ways the agent
  could not perceive" — these have different remedies (improve perception
  vs. handle unobservability). Refutation: if ECM-formalism architectures
  perform indistinguishably on goal-context-action provenance and transfer-
  failure attribution at matched cost, the formalism's claim of architectural
  payoff is empirically weak.

