id: action-selection-as-common-substrate
name: Action Selection as Common Substrate
status: canonical
version: 1.0.0
created: '2026-05-10'
audience_voice: builder

natural_exemplars:
  - species: 'Vertebrates (lamprey to human; ~560 million years of conservation)'
    paper:
      title: >
        Embodied and embedded ecological rationality: A common vertebrate
        mechanism for action selection underlies cognition and heuristic
        decision-making in humans
      authors:
        - 'Nordli, Samuel A.'
        - 'Todd, Peter M.'
      venue: 'Frontiers in Psychology'
      date: '2022-11-17'
      doi: '10.3389/fpsyg.2022.841972'
      url: 'https://doi.org/10.3389/fpsyg.2022.841972'
    notes: >
      Documents the cortico-basal ganglia-thalamo-cortical (CBGTC) loop as
      the universal vertebrate mechanism for action selection. The basal
      ganglia inhibit most behaviour by default and selectively disinhibit
      chosen actions in sequence; this circuit has remained virtually
      unchanged from lamprey (most ancestral living vertebrate, ~560 Mya
      divergence) to modern humans. Action selection is therefore a
      vertebrate-deep substrate invariant.

  - species: 'Bacteria (Escherichia coli, Vibrio cholerae, and others)'
    paper:
      title: 'The need for a new perspective on decision-making in bacteria'
      authors:
        - 'Nesin, Sibin Mathew'
        - 'Chandrankunnel, Mathew'
      venue: 'Communicative & Integrative Biology'
      date: '2025-02-12'
      doi: '10.1080/19420889.2025.2463926'
      url: 'https://doi.org/10.1080/19420889.2025.2463926'
    notes: >
      Documents action-selection-like architecture in organisms with no
      nervous system at all. Convergent-divergent molecular pathways perform
      the equivalent of default-inhibit / selective-disinhibit gating;
      cell-density-switched behaviour produces sequence construction;
      operon-regulon-module hierarchy produces contextual reinforcement of
      successful behavioural protocols. Architectural function is preserved;
      substrate is molecular regulatory networks, not neural circuitry.

  - species: 'Cnidarians (jellyfish, sea anemones)'
    paper:
      title: 'Cognitive capacity and control in the evolution of intelligence'
      authors:
        - 'Turner, Cameron Rouse'
        - 'Russek, Evan M.'
        - 'Seed, Amanda'
        - 'McEwen, Emma Suvi'
        - 'Vélez, Natalia'
        - 'Morgan, Thomas J. H.'
        - 'Griffiths, Thomas L.'
      venue: 'bioRxiv preprint'
      date: '2026-03-09'
      doi: '10.1101/2026.03.07.710317'
    notes: >
      Phylogenetic placement of jellyfish and sea anemones in the
      passive-storage cognitive regime — nerve net, no brain, but documented
      action selection via sensitisation. Cnidarian nerve-net implementation
      establishes the third substrate (alongside vertebrate-CBGTC and
      bacterial-molecular) at which action-selection appears as an
      architectural pattern.

abstract_claim: >
  Action selection — the architectural function of choosing what to do next
  given a goal and a context — is a substrate-general invariant. The
  function recurs across substrates as different as bacterial molecular
  regulatory networks (no nervous system at all), cnidarian nerve nets (no
  brain), and vertebrate cortico-basal ganglia-thalamo-cortical loops
  (centralised neural circuitry conserved virtually unchanged for ~560
  million years). The architectural pattern (default-inhibit / selective-
  disinhibit gating, goal-directed sequence construction, contextual
  reinforcement of successful sequences) is preserved across all three;
  only the substrate-specific implementation differs. AI architectures
  should treat action selection as a first-class architectural commitment
  rather than as an emergent property of an opaque substrate.

falsifiable_hypothesis: >
  At matched compute and identical task budgets, AI architectures with an
  explicit action-selection module — implementing default-inhibit /
  selective-disinhibit gating, goal-directed sequence construction, and
  contextual reinforcement of successful sequences as an architectural
  commitment — outperform substrate-implicit architectures (transformer
  autoregressive decoding without an explicit selection layer; RL agents
  without a named selection module) on tasks involving long-horizon goal
  pursuit, chunked-sequence reuse across contexts, and recovery from
  premature commitment. A second testable claim: explicit action-selection
  architectures should generalise across motor and cognitive domains
  (when paired with the exaptation NEXI) at lower marginal cost than
  duplicate-module architectures. Refutation: if substrate-implicit
  architectures perform indistinguishably on long-horizon goal-pursuit
  benchmarks at matched compute, the substrate-general invariant claim
  is empirically weak and the NEXI's promotion to canonical should be
  reconsidered.

