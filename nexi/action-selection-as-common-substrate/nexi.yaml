when_to_use: >
  Any deployment where the system must select among alternatives to commit
  to a behavioural sequence — agentic systems, embodied robots, tool-using
  agents, hierarchical planners, cross-domain agents. Especially valuable
  when the deployment benefits from making the selection mechanism
  inspectable, lesionable, and shareable across domains.

when_not_to_use: >
  Pure-perception or pure-classification systems with no commitment among
  alternatives. Deployments where opaque substrate-implicit selection is
  performing well. Pre-training / foundation-model substrate construction
  (the NEXI operates at deployment-time architecture).

tradeoffs: >
  Treating action selection as a first-class architectural commitment costs
  upfront design effort and module-boundary discipline. In return, the
  selection mechanism becomes inspectable, lesionable, and reusable across
  domains. For deployments where the selection mechanism is
  implicit-but-working, the discipline is overhead. For deployments where
  selection failures are the dominant failure mode, the discipline pays.

