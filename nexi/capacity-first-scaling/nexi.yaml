formats:
  - architecture
  - skill

when_to_use: >
  Any architecture-design or scaling decision under a fixed budget increase, especially
  when the deployment's task complexity is at or above existing capacity. The rule
  applies most strongly near the capacity-bound regime — where adding storage produces
  outsize returns relative to adding regulation.

when_not_to_use: >
  Deployments where capacity already exceeds task complexity by a wide margin (the
  marginal returns from more capacity are then small); joint-scaling architectures
  where capacity and control scale together with parameter count without separable
  decisions; settings where capacity-component cost grows non-linearly faster than
  control-component cost (e.g. quadratic full-attention over very long context).

tradeoffs: >
  Clarity-of-decomposition (tagging each component capacity vs. control) requires
  upfront work and may surface joint components that resist clean split. Strict
  capacity-first discipline can under-invest in control during phases where the
  niche-specific synergy regime makes balanced scaling locally optimal. The rule is
  best read as prerequisite-ordering ("capacity first, then control becomes useful"),
  not as terminal-investment ("capacity always dominates").

