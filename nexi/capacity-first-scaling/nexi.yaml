id: capacity-first-scaling
name: Capacity-First Scaling
status: draft
version: 0.1.0
created: 2026-05-03
audience_voice: builder

natural_exemplars:
  - species: 'Cross-species evolutionary model (mathematical)'
    paper:
      title: 'Cognitive capacity and control in the evolution of intelligence'
      authors:
        - 'Turner, Cameron Rouse'
        - 'Russek, Evan M.'
        - 'Seed, Amanda'
        - 'McEwen, Emma Suvi'
        - 'Vélez, Natalia'
        - 'Morgan, Thomas J. H.'
        - 'Griffiths, Thomas L.'
      venue: 'bioRxiv preprint'
      date: '2026-03-09'
      doi: '10.1101/2026.03.07.710317'
    notes: >
      Mathematical evolutionary-optimality model in which capacity contributes linearly
      to recall efficacy while control contributes sublinearly, producing severe
      diminishing returns on regulation once representational space is saturated.
      Capacity-prioritization is robust across all examined metabolic-benefit levels.

  - species: 'Major brain-evolution transitions (across phyla)'
    paper:
      title: 'The major transitions in the evolution of cognition'
      authors:
        - 'See Turner et al. 2026 references 57, 58'
      venue: 'composite literature'
      date: 'multi-decade'
    notes: >
      Independent of the formal model, the comparative-neuroscience record of major
      transitions in the control of information over brain evolution broadly coheres
      with capacity-first ordering — storage capabilities expand before regulation
      sophistication does.

abstract_claim: >
  When scaling a cognitive system, expand storage capacity before scaling control or
  regulation sophistication. Capacity contributes linearly to the system's effective
  ability to maintain useful representations; control contributes sublinearly, with
  severe diminishing returns once capacity is sufficient. Without capacity, control
  has no substrate to operate on — making capacity the prerequisite primitive in any
  cognitive architecture.

falsifiable_hypothesis: >
  At matched parameter / FLOP / cost budget, AI architectures that allocate marginal
  resources to capacity components (context window length, retrieval store size,
  KV-cache budget, memory-token slots, MoE expert count) outperform identical systems
  that allocate marginal resources to control components (attention-head count,
  attention-routing sophistication, agentic-loop iteration depth, planner branching
  factor, reasoning-chain depth) on memory-intensive and long-context evaluations
  by a measurable margin (>=10% improvement at matched budget). Refutation: if no
  systematic margin appears across an appropriate task suite, this NEXI is refuted
  as a scaling primitive.

