when_to_use: >
  AI deployments that currently implement Type 1 (fast / heuristic) and
  Type 2 (deliberative / chunked) reasoning as separate modules, where
  unification under one context-overlap-driven mechanism would simplify
  architecture and enable cross-domain error analysis. Embodied agents
  that mix motor and cognitive commitments under shared goal stacks.
  Research / engineering work testing whether dual-process architectures
  can be replaced with single-mechanism architectures that handle both
  fast and deliberative regimes via repertoire selection rather than
  module switching. Bounded-cognition contexts where the adaptive-
  toolbox framing (Gigerenzer, Todd) is the natural design lens.

when_not_to_use: >
  Deployments where Type 1 and Type 2 reasoning are genuinely
  implemented by different substrates that should remain separate
  (e.g. hardware accelerators for fast paths vs. general-purpose CPUs
  for deliberative paths). Pure-perception or pure-classification
  systems with no decision-among-alternatives structure. Cases where
  the dual-process architecture is performing well at low cost and
  unification would add complexity without payoff.

tradeoffs: >
  Heuristics-as-habits unification trades architectural simplification
  (one mechanism instead of two) and cross-domain error-analysis
  capability against the descriptive convenience of the dual-process
  framing. For deployments where dual-process is doing real work (e.g.
  hardware-accelerated fast paths), unification may not pay. For
  deployments where dual-process is a description rather than an
  architectural commitment, unification simplifies and exposes shared
  error signatures.

