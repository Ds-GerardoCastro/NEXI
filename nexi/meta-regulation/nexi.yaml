  - non-stationary-deployments
  - dynamic-architecture-search

formats:
  - architecture
  - skill

when_to_use: >
  Deployments expected to encounter distribution shift, non-stationarity,
  or heterogeneous task families that require the system to adapt its own
  regulatory behaviour at runtime. Multi-tier deployments where the base
  controller's behaviour should itself be modulated by deployment-context
  signals. Systems that cannot afford full retraining or redeployment to
  adjust to new conditions and need runtime adaptive regulation instead.

when_not_to_use: >
  Stable single-task deployments with no expected distribution shift —
  meta-regulator overhead provides no payoff. Compute-budget-constrained
  deployments where the meta-regulator's runtime cost is not justified
  by the magnitude of expected adaptation. Settings where the regulator
  layer itself is hand-tuned and stable; meta-regulation makes sense only
  when the regulator is dynamic enough to need its own controller.

tradeoffs: >
  Meta-regulation costs additional architectural complexity: an explicit
  meta-layer with its own dynamics, parameters, and runtime cost. It pays
  when the deployment encounters genuine non-stationarity that fixed
  regulators cannot handle. It can fail if the meta-regulator is itself
  fragile (control-of-control-of-control regress); architectural design
  must terminate the regress at a stable layer (typically a hand-tuned or
  pre-trained meta-regulator that is not itself regulated dynamically).

