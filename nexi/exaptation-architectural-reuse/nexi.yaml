  - skill

when_to_use: >
  Cross-domain agentic systems where the same underlying mechanism could
  benefit multiple domains if shared (motor + cognitive selection;
  physical + information search; reasoning + tool use as same-mechanism
  applications). Embodied-AI deployments where domain-duplicate machinery
  is the current default and reduction in marginal cost per new domain is
  valued. Research / engineering work explicitly testing whether the same
  mechanism can serve N domains as opposed to N copies of similar
  mechanisms. Mechanism-interpretability projects where exposing the
  reuse pattern is a deliverable.

when_not_to_use: >
  Single-domain deployments where there is no second domain to redeploy
  to. Deployments where the candidate mechanisms are domain-specifically
  optimised in ways that make reuse counterproductive (the marginal cost
  of forcing reuse exceeds the benefit). Pre-training / foundation-model
  substrate construction (the NEXI operates at deployment-time architecture,
  not at substrate-construction layer; pre-training already implicitly
  shares parameters across domains via end-to-end learning).

tradeoffs: >
  Architectural-reuse via exaptation trades specialisation efficiency
  (a domain-specific module can be tuned to its domain alone) against
  cross-domain reuse efficiency (one tuned module amortises across N
  domains, with cross-domain transfer of improvements). For deployments
  where one or two domains dominate cost, specialisation pays. For
  deployments adding N domains over time (typical of agentic systems
  growing capability surfaces), exaptation pays. Engineers should
  explicitly audit whether their growth path is "few domains, deep
  specialisation" or "many domains, shared substrate" before committing.

