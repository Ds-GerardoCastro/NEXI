id: convergent-integration-hub
name: Convergent Integration Hub
status: draft
version: 0.1.0
created: '2026-07-04'
audience_voice: builder

natural_exemplars:
  - species: 'Multiple independent lineages (honeybee, octopus, birds, primates)'
    paper:
      title: 'Convergent evolution of complex brains and high intelligence'
      authors:
        - 'Roth, Gerhard'
      venue: 'Philosophical Transactions of the Royal Society B'
      date: '2015-12-19'
      doi: '10.1098/rstb.2015.0049'
      url: 'https://doi.org/10.1098/rstb.2015.0049'
    notes: >
      "High levels of intelligence are invariantly bound to multimodal centres
      such as the mushroom bodies in insects, the vertical lobe in octopodids,
      the pallium in birds and the cerebral cortex in primates, all of which
      contain highly ordered associative neuronal networks." The recurring unit
      is a functional role — dense multimodal association — not a shared anatomy.

abstract_claim: >
  Across every lineage that has independently evolved high intelligence, the
  capability is localised to a discrete region that integrates multiple sensory
  streams through dense associative networks — mushroom body, vertical lobe,
  nidopallium, isocortex. The invariant is the functional role (multimodal
  convergence plus association), realised on non-homologous tissue. A capable
  system therefore benefits from a dedicated, dense integration hub where
  modalities and internal state meet, rather than from association diffused
  thinly across an undifferentiated substrate.

falsifiable_hypothesis: >
  Architectures that concentrate cross-modal and cross-state association into a
  dedicated dense integration hub achieve better cross-domain generalisation
  than architectures of equal capacity that spread association uniformly, at
  matched compute and connectivity budget. Refutation: if a system exhibiting
  strong cross-domain capability can be shown to have no localisable integration
  hub — association genuinely uniform across the substrate with no dense
  convergence locus — the hub-invariance claim is falsified; likewise if adding
  a dedicated hub yields no cross-domain benefit over a uniform baseline at
  equal budget.

applies_to:
  - world-models
  - multi-agent-systems
  - perception
  - architecture-selection
  - grounded-language

formats:
  - architecture

when_to_use: >
  When designing a system that must bind multiple modalities or multiple
  internal sub-systems into shared decisions, and you are choosing between a
  dedicated integration locus and diffuse late association. Useful as a design
  target derived from what independent biological routes to intelligence all share.

when_not_to_use: >
  Single-modality or single-subsystem tasks with nothing to integrate; settings
  where a strict latency or memory budget precludes a dedicated hub and late
  association is adequate; substrate-construction (pretraining) work, which is
  upstream of where an integration hub is architected.

tradeoffs: >
  A dedicated dense hub is a capacity and routing cost, and a single point whose
  failure degrades every downstream domain — the price of the coherence it buys.
  Diffuse association is cheaper and more robust to local failure but loses the
  cross-domain binding the hub provides.

