formats:
  - architecture
  - skill

when_to_use: >
  Any deployment-tier or model-family decision where the deployment niches differ in
  task payoff, cost budget, signal reliability, or task complexity enough to fall in
  different regimes. Particularly useful when planning a small / medium / flagship
  family that should be structurally — not just hyperparametrically — distinct.

when_not_to_use: >
  When deployment niches are too similar to fall in different regimes (regime selection
  collapses to a single answer). When architecture is fixed upstream by external
  constraints (regime classification is then informational only). When the niche is
  genuinely on a regime boundary — pick the closer regime and monitor for drift, but
  do not over-trust the classification.

tradeoffs: >
  Regime-discipline imposes architectural discontinuities across deployment tiers,
  which complicates code-sharing and maintenance compared to a single-architecture-
  across-tiers approach. Phase-boundary handling adds operational complexity (boundary
  flags, drift monitoring, planned migration). In return, regime-matched architectures
  exploit niche-specific structure that uniform architectures leave on the table.

