id: cognitive-regime-selection
name: Cognitive Regime Selection
status: draft
version: 0.1.0
created: 2026-05-03
audience_voice: builder

natural_exemplars:
  - species: 'Cross-species evolutionary model (mathematical, with phylogenetic placements)'
    paper:
      title: 'Cognitive capacity and control in the evolution of intelligence'
      authors:
        - 'Turner, Cameron Rouse'
        - 'Russek, Evan M.'
        - 'Seed, Amanda'
        - 'McEwen, Emma Suvi'
        - 'Vélez, Natalia'
        - 'Morgan, Thomas J. H.'
        - 'Griffiths, Thomas L.'
      venue: 'bioRxiv preprint'
      date: '2026-03-09'
      doi: '10.1101/2026.03.07.710317'
    notes: >
      The interaction of capacity-control synergy non-monotonicity with metabolic-cost
      selection produces three discrete attractors in the cognitive design space:
      passive-storage, control-enhanced, and capacity-heavy. Phylogenetic placements
      span jellyfish and sea anemones (passive-storage), nematodes / flatworms /
      tardigrades (transitional), corvids / elephants / cetaceans / great apes /
      humans / rhesus macaques (control-enhanced).

  - species: 'Homo sapiens and Macaca mulatta (rhesus macaque)'
    paper:
      title: 'Cognitive capacity and control in the evolution of intelligence (retro-cue task validation)'
      authors:
        - 'Turner et al.'
      venue: 'bioRxiv preprint (same source, empirical validation section)'
      date: '2026-03-09'
      doi: '10.1101/2026.03.07.710317'
    notes: >
      Empirical hierarchical Bayesian fit on retro-cue task: humans 0.26 [0.19, 0.34]
      proportion control; rhesus macaques 0.05 [0.02, 0.16] — both fall in the
      control-enhanced regime, contradicting the information-capacity hypothesis's
      prediction that humans would be capacity-heavy.

abstract_claim: >
  Cognitive design space contains three discrete attractors — passive-storage,
  control-enhanced, and capacity-heavy — and the deployment niche selects which one
  is optimal. Architectures should be classified into a regime at design time and
  committed to that regime's characteristic component mix; selecting one architecture
  for all niches under-performs regime-matched architectures because the regimes are
  structurally distinct, not points on a continuous scaling axis.

falsifiable_hypothesis: >
  At matched cost budget, regime-matched architectures (passive-storage, control-enhanced,
  or capacity-heavy as appropriate) outperform a single one-size-fits-all architecture
  deployed across distinct niches on niche-specific evaluation. Refutation: if regime-
  matched and uniform architectures perform indistinguishably across genuinely distinct
  niches at matched cost, the discrete-regime structure is not architecturally
  consequential — only continuous scaling matters. A second falsifiable claim: regime
  changes produce qualitative — not just quantitative — architectural component-mix
  differences; if re-classifying a deployment from one regime to another produces only
  hyperparameter shifts (no structural component changes), the regime taxonomy is
  descriptive but not prescriptive.

