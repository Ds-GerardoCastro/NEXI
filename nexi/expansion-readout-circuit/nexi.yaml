formats:
  - architecture

when_to_use: >
  When designing a representational stage for rapid associative
  generalisation under a bounded parameter or compute budget, and you are
  choosing between depth/width scaling of a dense network and an explicit
  expansion-then-sparse-readout stage. Useful where a substrate-general,
  convergently-evolved circuit motif is preferable to an ad-hoc design.

when_not_to_use: >
  Tasks with no associative-generalisation demand where a dense network at
  equal budget is adequate; extreme-latency settings where the expansion
  stage's width is unaffordable; substrate-construction (pretraining)
  regimes where this operates below the level being built.

tradeoffs: >
  The expansion sheet is wide and its width (density) is where the cost
  sits; the sparse readout controls activation cost but adds routing
  complexity. Against a dense baseline, the motif trades parameter density
  in a fixed/random expansion for cheaper, better-generalising associative
  recall — worthwhile only where associative generalisation is the
  bottleneck.

