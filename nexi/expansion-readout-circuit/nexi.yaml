when_to_use: >
  Architectures that need rapid associative generalisation from few
  examples, multi-modal binding under partial input, or pattern completion
  under noise. Substrate-level architectural commitment: design an
  expansion stage explicitly rather than expecting it to emerge from depth.
  Particularly valuable for systems that must integrate multiple modalities
  with limited training data per cross-modal binding.

when_not_to_use: >
  Tasks dominated by dense feature compositionality (e.g. high-resolution
  image classification with abundant training data) where a depth-scaled
  dense feedforward architecture has the right inductive bias. Deployments
  where parameter budget is severely constrained — the expansion stage adds
  width, and width has a non-trivial parameter cost even when activations
  are sparse.

tradeoffs: >
  The expansion stage adds parameter width that is not always free even
  with sparse activations. The sparse readout requires either a routing
  mechanism (mixture-of-experts) or explicit top-k selection — both add
  inference-time overhead. Debugging shifts from "which layer learned
  what" (dense-feedforward debugging) to "which subset of the expansion
  layer was selected by the readout" — a different inspection surface
  that interpretability tools must be tailored for.

