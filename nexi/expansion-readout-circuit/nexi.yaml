id: expansion-readout-circuit
name: Expansion-Readout Circuit
status: draft
version: 0.1.0
created: '2026-05-17'
audience_voice: builder

natural_exemplars:
  - species: 'Cross-phyletic synthesis (Hymenoptera, Cephalopoda, Teleostei, Aves, Mammalia)'
    paper:
      title: 'Convergent evolution of complex brains and high intelligence'
      authors:
        - 'Roth, Gerhard'
      venue: 'Philosophical Transactions of the Royal Society B: Biological Sciences'
      date: '2015-12-19'
      doi: '10.1098/rstb.2015.0049'
      url: 'https://doi.org/10.1098/rstb.2015.0049'
    notes: >
      The same circuit motif independently evolved across five non-homologous
      neural substrates. Quantitative cytoarchitecture: honeybee mushroom
      body (300 000 Kenyon cells receiving from ~800 antennal-lobe projection
      neurons via ~1M presynaptic contacts; sparse-to-dense expansion ~375×);
      octopus vertical lobe (1.8M afferent fibres penetrating 26M tiny
      interneurons in an orthogonal en-passant crossbar, converging onto
      65 000 large projection neurons). Same motif in cichlid pallium,
      corvid/psittacid avian pallium, mammalian isocortex. The motif:
      convergent multimodal afferents → high-dimensional expansion sheet of
      densely packed small interneurons (orthogonal crossbar connectivity) →
      sparse readout via a small population of large projection neurons.
      Functionally an *expand-then-readout* architecture: closer to
      cerebellum-like circuits / reservoir computing / random-projection
      feature expansion than to either dense feedforward or Hebbian
      plasticity alone. Vault-internal terminology: convergent-divergent fan.

abstract_claim: >
  Flexible cognition rests on a specific circuit motif — a sparse population
  of large projection neurons reading out from a vast expansion sheet of
  densely packed small interneurons, with input connectivity forming an
  orthogonal crossbar. The architecture is *expand-then-readout*: input
  dimensionality is dramatically expanded onto a high-dimensional
  interneuron substrate, then collapsed onto a sparse projection population
  that drives downstream behaviour. Roth (2015) documents this motif
  recurring convergently in five phyla on non-homologous neural substrates,
  with quantitative cytoarchitecture in bee and octopus. The pattern is a
  candidate substrate-general design primitive: AI architectures with a
  fixed-or-random high-dimensional expansion stage followed by a sparse
  projection readout should support rapid associative generalisation that
  flat depth-scaled dense networks miss.

falsifiable_hypothesis: >
  At matched parameter count and matched compute, AI architectures with a
  fixed-or-random high-dimensional expansion stage feeding a sparse
  projection readout (cerebellum-like circuits, reservoir computing,
  mixture-of-experts with sparse routing in the expansion direction)
  outperform equal-parameter dense feedforward baselines on tasks
  requiring rapid associative generalisation under bounded compute —
  specifically on few-shot novel-stimulus generalisation, multi-modal
  binding under partial input, and associative pattern completion.
  Operationalisation: on cerebellum-inspired benchmarks (associative-
  generalisation suite of CIFAR-FS, mini-ImageNet, omniglot-extended) the
  expansion-readout architecture should outperform equal-parameter dense
  baselines by ≥10% relative on few-shot accuracy. Refutation: if dense
  feedforward of equal parameter count matches expansion-readout on
  associative-generalisation benchmarks at matched compute, this pattern's
  claim is refuted and the convergent-evolution evidence becomes biological
  observation without computational implication.

