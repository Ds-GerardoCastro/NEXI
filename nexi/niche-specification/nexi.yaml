        - 'Loning, H.'
      venue: 'bioRxiv preprint'
      date: '2026-04-27'
      doi: '10.1101/2025.09.11.675577'
    notes: >
      Fission-fusion social architecture documented as a niche-conditional response to
      arid-zone non-stationarity. Same signal type (song) takes different functions in
      different contexts (breeding-colony vs. social-hotspot vs. dawn). Cognition is
      shaped by the ecological niche the organism inhabits, not abstracted from it.

abstract_claim: >
  There is no architecture without a niche. Cognitive design is shaped by ecological
  or deployment-niche parameters (task structure, signal reliability, resource envelope,
  error profile, social surround), and architectures should be specified, designed, and
  evaluated against the niche they target — not against generic benchmarks. The niche
  is the typed input upstream of architecture selection; specifying it is the most
  upstream step in any architecture-design pipeline.

falsifiable_hypothesis: >
  Niche-specified architectures outperform same-budget general-purpose architectures on
  niche-specific evaluation, when the niche is genuinely specified along the canonical
  axes (task structure, signal environment, resource envelope, error profile, social
  surround) and evaluation is in-niche. Refutation: if niche-specific and general-purpose
  architectures perform indistinguishably on in-niche evaluation at matched cost, the
  niche-binding claim is structurally weak. A second testable claim: a model that wins
  on a generic benchmark should not, on average, win on niche-specific benchmarks for
  niches it was not optimised for; if generic-benchmark winners transfer at the same rate
  as niche-specific competitors, niche binding is weaker than the claim asserts.

