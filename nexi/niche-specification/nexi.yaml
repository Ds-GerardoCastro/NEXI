    notes: >
      Explicit "information-processing niches" framing — niche conditions (task complexity,
      cue reliability, metabolic-energy availability) translate into the metabolic-cost-to-
      recall-benefit ratio that places a species in a regime. Domain-general capabilities
      become canalised under niche pressure into domain-specific specialisations.

  - species: 'Taeniopygia castanotis (zebra finch)'
