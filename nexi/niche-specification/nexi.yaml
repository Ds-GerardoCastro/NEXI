when_to_use: >
  At the very start of any architecture-design conversation, before regime classification
  or scaling decisions; whenever a deployment context is being specified or revised.
  Mandatory upstream of cognitive-regime-selection and capacity-first-scaling — the
  niche is their typed input.

when_not_to_use: >
  Foundation-model pretraining (substrate construction, not niche-bound — see
  bounded-cognitive-architecture collection's complementarity_notes for the canalisation
  framing). Single-architecture services that genuinely must serve many niches — use
  a router-of-niche-specialists pattern instead, where each specialist is niche-bound
  and the router classifies incoming requests. Research / exploratory architectures
  deliberately operating without niche commitment.

tradeoffs: >
  Niche-discipline costs upfront specification effort and forces "general purpose for
  everyone" deployments to confront their actual niche heterogeneity. In return,
  downstream architecture decisions become principled and evaluation becomes meaningful.
  Implicit-niche deployments are cheap to spec and expensive to debug; explicit-niche
  deployments are the inverse.

