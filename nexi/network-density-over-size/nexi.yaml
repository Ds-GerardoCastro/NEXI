id: network-density-over-size
name: Network Density Over Absolute Size
status: draft
version: 0.1.0
created: '2026-07-04'
audience_voice: builder

natural_exemplars:
  - species: 'Honeybee, octopus, elephant, cetaceans, corvids, primates'
    paper:
      title: 'Convergent evolution of complex brains and high intelligence'
      authors:
        - 'Roth, Gerhard'
      venue: 'Philosophical Transactions of the Royal Society B'
      date: '2015-12-19'
      doi: '10.1098/rstb.2015.0049'
      url: 'https://doi.org/10.1098/rstb.2015.0049'
    notes: >
      "Despite their very large brains, elephants and cetaceans turn out to
      possess an intelligence definitely inferior to monkeys and apes and also
      possibly to corvid and psittacid birds." Insect Kenyon-cell packing density
      is "15 times higher than the highest ones found in the vertebrate brain."
      The load-bearing correlates of intelligence are neuron number, packing
      density and connectivity — quantitative and substrate-agnostic — not
      absolute brain size.

abstract_claim: >
  The correlates of high intelligence are network-quality metrics — neuron
  number, packing density, connection number and pattern, cell-type diversity —
  not absolute size. Larger is not smarter: lineages with the largest brains
  (elephants, cetaceans) rank below lineages with denser, more connected networks
  (corvids, primates). For an artificial system the analogous claim is that
  capability tracks effective connectivity and representational density rather
  than raw parameter or unit count, and that scaling size without scaling
  integration density yields diminishing cognitive return.

falsifiable_hypothesis: >
  If capability tracks connectivity density rather than absolute scale, then at
  matched total size a system with higher effective integration density
  (richer connectivity into and within its association substrate) should
  outperform a sparser same-size system on cross-domain cognitive tasks — and
  increasing absolute size while holding integration density constant should
  produce sub-proportional capability gains. Refutation: if absolute size (raw
  parameter or unit count) predicts capability at least as well as any density
  metric across systems — i.e. the biggest reliably win regardless of
  connectivity structure — the density-over-size claim is falsified.

applies_to:
  - scaling-laws
  - architecture-selection
  - model-efficiency
  - agi-critique

formats:
  - architecture

when_to_use: >
  When reasoning about scaling decisions and whether to add absolute size or add
  connectivity/integration density; as a comparative-biology-grounded counter to
  size-equals-capability arguments; when evaluating efficiency of a design at
  fixed capability.

when_not_to_use: >
  Regimes where scale is empirically the dominant driver for the target task and
  no integration bottleneck is observed; settings where "density" cannot be
  meaningfully defined or measured for the substrate in question.

tradeoffs: >
  Optimising for connectivity density rather than raw size can raise routing and
  wiring cost and complicate parallelism, in exchange for better capability per
  unit of scale. Where scale is cheap and density is expensive to engineer, the
  size route may still win on total cost even if it is less efficient per unit.

