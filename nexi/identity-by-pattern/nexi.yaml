id: identity-by-pattern
name: Identity by Pattern
status: draft
version: 0.1.0
created: '2026-05-03'
audience_voice: builder

natural_exemplars:
  - species: 'Taeniopygia castanotis (zebra finch)'
    paper:
      title: 'Communication Networks of Wild Zebra Finches (Taeniopygia castanotis)'
      authors:
        - 'Hagedoorn, K.'
        - 'Tschirren, N.'
        - 'ter Avest, E.'
        - 'Tyson, C.'
        - 'Snijders, L.'
        - 'Griffith, S. C.'
        - 'Naguib, M.'
        - 'Loning, H.'
      venue: 'bioRxiv preprint'
      date: '2026-04-27'
      doi: '10.1101/2025.09.11.675577'
    notes: >
      Wild zebra finches are individually identifiable from distinctive song
      motifs. Researchers map social networks acoustically by individual
      signature alone, without physical tagging. The same paper reports the
      empirical wall: BirdNET embeddings work at species level but are not
      yet case-by-case reliable at individual level.

abstract_claim: >
  Individual identity is encoded in distinctive sensory patterns and is
  recoverable from observation alone — but only with embedding spaces
  explicitly trained for within-class discriminability. Models that
  aggregate at category level systematically lose particular-level
  information; the gap is structural, not a function of dataset size alone.

falsifiable_hypothesis: >
  Embedding architectures trained with within-class-discriminability
  objectives (margin-based contrastive losses, triplet objectives,
  ArcFace-style margins) achieve higher accuracy on individual-level
  re-identification tasks than embeddings trained only on category-level
  objectives, at equal training compute. Operationalised on benchmarks
  of speaker / person / individual-animal re-identification, the
  particularity-preserving embeddings should achieve >=10% relative gain
  in top-1 accuracy. Refutation: if category-only embeddings match
  particularity-preserving ones on individual-level tasks at equal
  compute, this pattern's claim is refuted.

