formats:
  - architecture
  - skill

when_to_use: >
  Multi-agent settings where peers have stable, distinctive sensory
  signatures and the system needs persistent re-identification across
  observations. Tasks include longitudinal tracking, social-network
  mapping, persistent agent modelling. Used jointly with eavesdropping —
  observation without identity is noise.

when_not_to_use: >
  Tasks where category-level recognition suffices; settings where signals
  are not naturally distinctive (anonymous crowds, fungible inputs);
  adversarial settings where peers can spoof signatures.

tradeoffs: >
  Within-class discriminability training requires careful sampling
  (anchor / positive / negative tuples) and is more expensive per step.
  Identity-preserving embeddings tend to be larger. Evaluation is harder
  — individual-level metrics need longitudinal datasets.

