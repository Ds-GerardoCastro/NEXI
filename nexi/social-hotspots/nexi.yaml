id: social-hotspots
name: Social Hotspots
status: draft
version: 0.1.1
created: '2026-05-03'
audience_voice: builder

natural_exemplars:
  - species: 'Taeniopygia castanotis (zebra finch)'
    paper:
      title: 'Communication Networks of Wild Zebra Finches (Taeniopygia castanotis)'
      authors:
        - 'Hagedoorn, K.'
        - 'Tschirren, N.'
        - 'ter Avest, E.'
        - 'Tyson, C.'
        - 'Snijders, L.'
        - 'Griffith, S. C.'
        - 'Naguib, M.'
        - 'Loning, H.'
      venue: 'bioRxiv preprint'
      date: '2025-09-11'
      doi: '10.1101/2025.09.11.675577'
    notes: >
      Wild zebra finch social hotspots are not anonymous gathering points
      but structured information hubs where repeated encounters mix
      known and unknown individuals. The paper hedges the possible
      functions: hotspots may support foraging information and condition
      signalling directly, and — via the secondary literature it cites —
      could plausibly aid predation dilution and breeding synchronisation.
      Information density concentrates spatially.

abstract_claim: >
  In multi-agent systems with shared environments, information density
  concentrates at specific locations (or virtual loci) where many
  agents converge — not uniformly across the environment. We hypothesise
  that architectures which explicitly model these hotspots and weight
  observation / retrieval / attention by spatial-or-virtual proximity
  outperform architectures that treat the population uniformly; this is
  a falsifiable prediction (see falsifiable_hypothesis), not an
  established result. Where bodies converge, information aggregates.

falsifiable_hypothesis: >
  Multi-agent systems with location-keyed memory and proximity-weighted
  retrieval outperform agents with uniform memory access on tasks where
  the distribution of relevant information is spatially structured, at
  equal training compute. Pre-registered, compute-matched target: on the
  Melting Pot "Coins" / "Clean Up" cooperative-foraging substrates
  (DeepMind Melting Pot 2.0, fixed evaluation scenarios), hotspot-aware
  agents reach the uniform-memory baseline's final mean episode return in
  >=10% fewer training episodes at equal wall-clock compute and identical
  network capacity. Refutation: if uniform-memory baselines match or beat
  hotspot-aware agents on these Melting Pot substrates at equal compute
  (the >=10% episode-efficiency gain does not appear), this pattern's
  claim is refuted.

applies_to:
  - multi-agent-systems
  - robotics
  - foraging
  - distributed-cognition
  - spatial-reasoning

formats:
  - architecture
  - skill

when_to_use: >
  Multi-agent systems where the environment has spatial structure (or
  virtual analogs like topic-clusters) and information distribution
  is non-uniform; tasks where convergence-to-density itself is a
  signal (foraging, social inference, market-making, swarm robotics).

when_not_to_use: >
  Single-agent systems; environments without spatial or topical
  structure; tasks with strictly uniform information distribution;
  privacy-sensitive contexts where revealing convergence patterns is
  itself a leak.

tradeoffs: >
  Spatial memory adds storage and retrieval cost (proximity-weighted
  queries are more expensive than uniform retrievals). Hotspot
  detection may produce false positives in noisy environments.
  Architectural complexity rises — hotspots are an additional state
  the system must maintain.

